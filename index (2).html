*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f2;color:#1a1a18;min-height:100vh}
.nav{background:#fff;border-bottom:0.5px solid #ddd;position:sticky;top:0;z-index:50}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-logo{padding:0 1rem;font-size:13px;font-weight:500;color:#888;display:flex;align-items:center;white-space:nowrap;border-right:0.5px solid #eee;flex-shrink:0}
.nav-tab{padding:14px 16px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;background:transparent;border-top:none;border-left:none;border-right:none}
.nav-tab:hover{color:#1a1a18}
.nav-tab.active{color:#1d4ed8;border-bottom-color:#1d4ed8;font-weight:500}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:20px;margin:auto 1rem auto auto;flex-shrink:0}
.sync-ok{background:#EAF3DE;color:#27500A}
.sync-saving{background:#FAEEDA;color:#633806}
.sync-err{background:#FCEBEB;color:#501313}
.page{display:none;padding:1.5rem 1rem;max-width:960px;margin:0 auto}
.page.active{display:block}

/* HOME */
.hero{margin-bottom:1.5rem}
.hero h1{font-size:20px;font-weight:500;margin-bottom:4px}
.hero p{font-size:13px;color:#666}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:14px 16px}
.kpi .k-label{font-size:11px;color:#888;margin-bottom:4px}
.kpi .k-value{font-size:22px;font-weight:500}
.kpi .k-sub{font-size:11px;color:#888;margin-top:3px}
.section-title-home{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin:1.5rem 0 10px}
.alert-cards{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.alert-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.alert-card .a-title{font-size:13px;font-weight:500}
.alert-card .a-sub{font-size:12px;color:#888;margin-top:2px}
.alert-card .a-badge{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.overview-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
@media(min-width:560px){.overview-grid{grid-template-columns:repeat(3,1fr)}}

.ov-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:1rem;cursor:pointer}
.ov-card:hover{border-color:#93c5fd}
.ov-card .disc{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.ov-card .nome{font-size:13px;font-weight:500;margin-bottom:8px}
.ov-card .mini-stats{display:flex;gap:8px;margin-bottom:7px}
.ov-card .ms{font-size:11px;color:#666}
.ov-card .ms span{display:block;font-size:15px;font-weight:500;color:#1a1a18}
.progress-bar{height:4px;border-radius:3px;background:#eee;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.heatmap-wrap{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:16px;margin-bottom:1.5rem}
.heatmap-wrap h3{font-size:13px;font-weight:500;margin-bottom:12px}
.heatmap{display:flex;gap:4px;flex-wrap:wrap}
.hm-day{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;border:0.5px solid #eee;background:#f5f5f2;flex-shrink:0}
.hm-day.has-1{background:#EAF3DE;border-color:#C0DD97;color:#3B6D11}
.hm-day.has-2{background:#d4edbe;border-color:#97C459;color:#27500A}
.hm-day.has-3{background:#c0e49e;border-color:#639922;color:#27500A}
.hm-day.today{outline:2px solid #3b82f6;outline-offset:1px}
.streak-box{display:flex;gap:10px;margin-bottom:1.5rem}
.streak-card{flex:1;background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:14px 16px;text-align:center}
.streak-card .s-num{font-size:28px;font-weight:500}
.streak-card .s-label{font-size:12px;color:#888;margin-top:2px}
.streak-fire{color:#d97706}

/* DISCIPLINE */
.page-header{margin-bottom:1.25rem}
.page-header h2{font-size:18px;font-weight:500;margin-bottom:4px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:#eeeee9;border-radius:8px;padding:12px 16px}
.stat-card .label{font-size:12px;color:#666;margin-bottom:4px}
.stat-card .value{font-size:20px;font-weight:500}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:1.25rem}

.chart-box{background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:16px}
.chart-box.full{grid-column:1/-1}
.chart-box h3{font-size:13px;font-weight:500;margin-bottom:4px}
.chart-box p{font-size:12px;color:#888;margin-bottom:12px}
.topic-select{font-size:12px;border:0.5px solid #ccc;border-radius:6px;padding:4px 8px;background:#fff;color:#1a1a18;margin-bottom:10px;width:100%}

.controls{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sort-sel{font-size:13px;border:0.5px solid #ccc;border-radius:8px;padding:5px 10px;background:#fff;color:#1a1a18;margin-left:auto}
.legend{margin-bottom:1rem}
.legend-title{font-size:11px;color:#888;margin-bottom:5px}
.legend-row{display:flex;gap:6px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;background:#fff;border:0.5px solid #e5e5e5;border-radius:6px;padding:3px 7px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.section{margin-bottom:1.25rem}
.section-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;padding-bottom:5px;border-bottom:0.5px solid #ddd}

/* TOPIC BLOCK */
.topic-block{margin-bottom:6px}
.topic-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:0.5px solid transparent}

.topic-row.never{background:#fff;border-color:#e5e5e5}
.topic-row.red-3{background:#FCEBEB;border-color:#F7C1C1}
.topic-row.red-2{background:#FAECE7;border-color:#F5C4B3}
.topic-row.red-1{background:#FAEEDA;border-color:#FAC775}
.topic-row.hot-3{background:#c0e49e;border-color:#639922}
.topic-row.hot-2{background:#d4edbe;border-color:#97C459}
.topic-row.hot-1{background:#EAF3DE;border-color:#C0DD97}
.topic-row.warm-3{background:#dde8c8;border-color:#adc87a}
.topic-row.warm-2{background:#e5ecd4;border-color:#b8cc8a}
.topic-row.warm-1{background:#edf0dc;border-color:#c5d09a}
.topic-row.cool-3{background:#e8e8d8;border-color:#c0c0a0}
.topic-row.cool-2{background:#eaeade;border-color:#c5c5aa}
.topic-row.cool-1{background:#ecece2;border-color:#cacab5}
.topic-row.cold-3{background:#FAECE7;border-color:#F5C4B3}
.topic-row.cold-2{background:#FAEEDA;border-color:#FAC775}
.topic-row.cold-1{background:#f5f0e0;border-color:#ddd5b0}
.topic-left{display:flex;flex-direction:column;gap:0}
.topic-name{font-size:14px;color:#1a1a18}
.notes-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:11px;color:#aaa;cursor:pointer;background:none;border:none;padding:0;line-height:1}
.notes-toggle:hover{color:#555}
.notes-toggle.has-note{color:#3b82f6}
.notes-area{display:none;padding:8px 12px 10px;background:rgba(0,0,0,0.025);border-radius:0 0 8px 8px;border-top:0.5px solid rgba(0,0,0,0.06)}
.notes-area.open{display:block}
.notes-textarea{width:100%;border:0.5px solid #d0d0d0;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;color:#1a1a18;background:#fff;resize:vertical;min-height:72px;line-height:1.6;outline:none}
.notes-textarea:focus{border-color:#3b82f6}
.notes-footer{display:flex;justify-content:flex-end;margin-top:6px;gap:6px;align-items:center}
.notes-saved{font-size:11px;color:#27500A;opacity:0;transition:opacity 0.4s}
.notes-saved.show{opacity:1}
.btn-save-note{background:#dbeafe;border:none;border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer;color:#1d4ed8;font-weight:500}
.urgency-badge{font-size:11px;padding:3px 8px;border-radius:20px;white-space:nowrap;background:rgba(0,0,0,0.06);color:#555}
.meta-col{text-align:right}
.acerto-display{font-size:14px;font-weight:500}
.revisoes-display{font-size:11px;color:#888}
.btn-revisar{background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#555;white-space:nowrap}
.btn-revisar:hover{background:#f0f0ed}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);align-items:center;justify-content:center;z-index:200}
.modal-bg.open{display:flex}
.modal{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.5rem;width:380px;max-width:95vw}
.modal h2{font-size:16px;font-weight:500;margin-bottom:4px}
.modal .sub{font-size:13px;color:#888;margin-bottom:1.25rem}

/* tipo selector */
.tipo-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.tipo-btn{border:1.5px solid #e5e5e5;border-radius:10px;padding:12px 10px;cursor:pointer;background:#fff;text-align:center;transition:border-color 0.15s,background 0.15s}
.tipo-btn:hover{border-color:#93c5fd}
.tipo-btn.selected-estudo{border-color:#16a34a;background:#f0fdf4}
.tipo-btn.selected-questoes{border-color:#1d4ed8;background:#eff6ff}
.tipo-btn .tb-icon{font-size:22px;margin-bottom:4px}
.tipo-btn .tb-label{font-size:13px;font-weight:500;color:#1a1a18}
.tipo-btn .tb-sub{font-size:11px;color:#888;margin-top:2px}

/* slider section */
.slider-section{display:none;margin-bottom:1.25rem}
.slider-section.visible{display:block}
.pct-label{font-size:13px;color:#666;margin-bottom:4px}
.pct-val{font-size:32px;font-weight:500;margin-bottom:8px}
.modal input[type=range]{width:100%;margin-bottom:0;accent-color:#3b82f6}

/* histórico */
.hist-title{font-size:12px;color:#888;margin-bottom:5px;margin-top:1rem}
.hist-list{display:flex;flex-direction:column;gap:3px;margin-bottom:1rem;max-height:130px;overflow-y:auto}
.hist-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 8px;background:#f5f5f2;border-radius:5px;gap:6px}
.hist-type{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.hist-type.estudo{background:#dcfce7;color:#15803d}
.hist-type.questoes{background:#dbeafe;color:#1d4ed8}
.hist-date{color:#888;flex:1}
.hist-pct{font-weight:500;min-width:32px;text-align:right}
.hist-actions{display:flex;gap:4px;flex-shrink:0}
.btn-conv{background:transparent;border:none;font-size:10px;color:#888;cursor:pointer;padding:0 3px;text-decoration:underline}
.btn-conv:hover{color:#1a1a18}
.btn-del{background:transparent;border:none;font-size:11px;color:#E24B4A;cursor:pointer;padding:0 3px}
.empty-hist{font-size:12px;color:#aaa;margin-bottom:1rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{background:transparent;border:0.5px solid #ccc;border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;color:#666}
.btn-save-rev{border:none;border-radius:8px;padding:7px 18px;font-size:13px;cursor:pointer;font-weight:500;opacity:0.4;pointer-events:none}
.btn-save-rev.ready-estudo{background:#dcfce7;color:#15803d;opacity:1;pointer-events:auto}
.btn-save-rev.ready-questoes{background:#dbeafe;color:#1d4ed8;opacity:1;pointer-events:auto}

.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
.no-data{font-size:12px;color:#aaa;text-align:center;padding:1.5rem 0}
</style>
</head>

<nav class="nav">

</div>

function setSyncBadge(s){
  const b=document.getElementById('sync-badge');b.className='sync-badge';
  if(s==='ok'){b.classList.add('sync-ok');b.textContent='sincronizado';}
  else if(s==='saving'){b.classList.add('sync-saving');b.textContent='salvando...';}
  else{b.classList.add('sync-err');b.textContent='erro ao salvar';}
}
async function loadFromFirebase(){
  try{
    const snap=await getDoc(DOC_REF);
    if(snap.exists()){
      const d=snap.data();
      state=d.state||{};
      notes=d.notes||{};
      // migrar registros antigos que não têm campo 'tipo'
      Object.keys(state).forEach(id=>{
        const s=state[id];
        if(!s.entries){
          // converte formato antigo para novo
          s.entries=(s.acertos||[]).map((ac,i)=>({
            tipo:'questoes', // padrão: assume questões para registros antigos
            acerto:ac,
            date:s.dates&&s.dates[i]?s.dates[i]:null
          }));
        }
      });
    }else{state={};notes={};}
  }catch(e){state={};notes={};}
  TOPICS.forEach(t=>{
    if(!state[t.id])state[t.id]={revisoes:0,entries:[],lastDate:null};
    if(!state[t.id].entries)state[t.id].entries=[];
  });
  setSyncBadge('ok');
  renderHome();
}
function scheduleSave(){
  setSyncBadge('saving');clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{await setDoc(DOC_REF,{state,notes});setSyncBadge('ok');}
    catch(e){setSyncBadge('err');}
  },800);
}

// ── HELPERS ──
function daysSince(d){if(!d)return Infinity;return Math.floor((new Date()-new Date(d))/864e5);}
function isoDate(offset=0){const d=new Date();d.setDate(d.getDate()-offset);return d.toISOString().split('T')[0];}

function getEntries(id){return state[id]?.entries||[];}

// média só de questões
function avgAcerto(id){
  const qs=getEntries(id).filter(e=>e.tipo==='questoes'&&e.acerto!=null);
  if(!qs.length)return null;
  return Math.round(qs.reduce((s,e)=>s+e.acerto,0)/qs.length);
}

// total de revisões (estudo + questões)
function totalRevs(id){return getEntries(id).length;}

function urgencyText(id){
  const s=state[id];if(!s||!s.lastDate)return 'Nunca revisado';
  const d=daysSince(s.lastDate);
  if(d===0)return 'Hoje';if(d===1)return 'Ontem';return d+' dias atrás';
}

function colorClass(id){
  const s=state[id];if(!s||!s.lastDate)return 'never';
  const ac=avgAcerto(id);
  const d=daysSince(s.lastDate);
  // sem questões ainda mas tem estudo — usa cor neutra que esfria
  if(ac===null){
    if(d<=2)return 'warm-1';if(d<=6)return 'cool-1';if(d<=13)return 'cold-1';return 'cold-1';
  }
  if(ac<40)return 'red-3';if(ac<55)return 'red-2';
  if(ac<70){if(d<=3)return 'red-1';if(d<=7)return 'cool-1';return 'cold-1';}
  const i=ac>=90?3:ac>=80?2:1;
  if(d<=2)return `hot-${i}`;if(d<=6)return `warm-${i}`;if(d<=13)return `cool-${i}`;return `cold-${i}`;
}

function urgencyScore(id){
  const s=state[id];if(!s||!s.lastDate)return 9999;return daysSince(s.lastDate);
}
function barColor(v){return v>=80?'#639922':v>=70?'#97C459':v>=55?'#EF9F27':'#E24B4A';}
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

function renderStreak(){
  const allDates=new Set();
  TOPICS.forEach(t=>{getEntries(t.id).forEach(e=>{if(e.date){const iso=e.date.includes('/')?e.date.split('/').reverse().join('-'):e.date;allDates.add(iso);}});});
  let streak=0,i=0;
  while(allDates.has(isoDate(i))){streak++;i++;}
  const sorted=[...allDates].sort();
  let best=streak,cur=1;
  for(let j=1;j<sorted.length;j++){const diff=(new Date(sorted[j])-new Date(sorted[j-1]))/864e5;if(diff===1){cur++;best=Math.max(best,cur);}else cur=1;}
  document.getElementById('streak-box').innerHTML=`
    <div class="streak-card"><div class="s-num streak-fire">${streak}</div><div class="s-label">dias seguidos</div></div>
    <div class="streak-card"><div class="s-num">${best}</div><div class="s-label">melhor sequência</div></div>
    <div class="streak-card"><div class="s-num">${allDates.size}</div><div class="s-label">dias com revisão</div></div>`;
}

function renderAlerts(){
  const cands=TOPICS
    .filter(t=>state[t.id]&&state[t.id].lastDate)
    .map(t=>({t,ac:avgAcerto(t.id),d:daysSince(state[t.id].lastDate)}))
    .filter(x=>x.ac<70||x.d>7)
    .sort((a,b)=>((a.ac!=null?100-a.ac:50)+a.d*2)-((b.ac!=null?100-b.ac:50)+b.d*2)).reverse().slice(0,5);
  if(!cands.length){document.getElementById('alert-cards').innerHTML='<div style="font-size:13px;color:#888;padding:8px 0">Nenhum alerta no momento!</div>';return;}
  document.getElementById('alert-cards').innerHTML=cands.map(({t,ac,d})=>{
    const cor=ac!=null&&ac<55?'#E24B4A':'#d97706';
    const motivo=ac!=null&&ac<55?`Acerto baixo em questões (${ac}%)`:`${d} dias sem revisar`;
    return `<div class="alert-card">
      <div class="alert-dot" style="background:${cor}"></div>
      <div><div class="a-title">${t.title}</div><div class="a-sub">${AREAS[t.area].label}${t.g?' · '+t.g:''} — ${motivo}</div></div>
      <span class="a-badge" style="background:${cor}22;color:${cor}">${ac!=null&&ac<55?ac+'%':d+'d'}</span>
    </div>`;
  }).join('');
}

function renderHeatmap(){
  const allDates={};
  TOPICS.forEach(t=>{getEntries(t.id).forEach(e=>{if(e.date){const iso=e.date.includes('/')?e.date.split('/').reverse().join('-'):e.date;allDates[iso]=(allDates[iso]||0)+1;}});});
  const hm=document.getElementById('heatmap');hm.innerHTML='';
  const today=isoDate(0);
  for(let i=27;i>=0;i--){
    const iso=isoDate(i);const d=new Date(iso+'T12:00:00');
    const count=allDates[iso]||0;const cls=count?`has-${Math.min(count,3)}`:'';
    const tod=iso===today?' today':'';
    hm.innerHTML+=`<div class="hm-day ${cls}${tod}" title="${iso}: ${count} revisão(ões)">${d.getDate()}</div>`;
  }
}

function renderCharts(area){
  const topics=TOPICS.filter(t=>t.area===area);
  const reviewed=topics.filter(t=>state[t.id]&&state[t.id].lastDate);
  const container=document.getElementById(area+'-charts');
  if(!reviewed.length){container.innerHTML='';return;}
  const groups={};
  topics.forEach(t=>{
    const g=t.g||'Geral';if(!groups[g])groups[g]={acertos:[],revs:0};
    const ac=avgAcerto(t.id);if(ac!==null)groups[g].acertos.push(ac);
    groups[g].revs+=totalRevs(t.id);
  });
  const gNames=Object.keys(groups);
  const gAvgs=gNames.map(g=>groups[g].acertos.length?Math.round(groups[g].acertos.reduce((a,b)=>a+b,0)/groups[g].acertos.length):0);
  const hasSubgroups=gNames.length>1;
  const bTopics=reviewed.slice(0,20);
  const bLabels=bTopics.map(t=>t.title.length>30?t.title.substring(0,28)+'…':t.title);
  const bAcertos=bTopics.map(t=>avgAcerto(t.id)??0);
  const bRevs=bTopics.map(t=>totalRevs(t.id));
  const maxRevs=Math.max(...bRevs,1);
  const multiRevs=reviewed.filter(t=>getEntries(t.id).filter(e=>e.tipo==='questoes').length>=2);
  container.innerHTML=`
    <div class="charts-grid">
      ${hasSubgroups?`<div class="chart-box">
        <h3>Radar — equilíbrio por subtema</h3><p>Média de acerto em questões</p>
        <canvas id="radar-${area}" height="260"></canvas>
      </div>`:''}
      <div class="chart-box ${hasSubgroups?'':'full'}">
        <h3>Ranking — acerto × revisões</h3><p>Barras: % acerto em questões · Linha: total de revisões</p>
        <canvas id="bar-${area}" height="${Math.max(180,bTopics.length*22)}"></canvas>
      </div>
      <div class="chart-box full">
        <h3>Linha do tempo — evolução de um tópico</h3>
        <p>Somente revisões do tipo "questões" com 2+ registros</p>
        ${multiRevs.length?`
          <select class="topic-select" id="sel-${area}" onchange="updateTimeline('${area}')">
            ${multiRevs.map(t=>`<option value="${t.id}">${t.title.length>60?t.title.substring(0,58)+'…':t.title}</option>`).join('')}
          </select>
          <canvas id="line-${area}" height="160"></canvas>`
        :'<div class="no-data">Registre 2 ou mais revisões de questões em um tópico para ver a evolução.</div>'}
      </div>
    </div>`;
  if(hasSubgroups){
    destroyChart('radar-'+area);
    chartInstances['radar-'+area]=new Chart(document.getElementById('radar-'+area),{
      type:'radar',
      data:{labels:gNames,datasets:[{label:'Acerto médio (%)',data:gAvgs,backgroundColor:AREAS[area].cor+'33',borderColor:AREAS[area].cor,borderWidth:2,pointBackgroundColor:AREAS[area].cor,pointRadius:4}]},
      options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10}},pointLabels:{font:{size:11}}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw}%`}}}}
    });
  }
  destroyChart('bar-'+area);
  chartInstances['bar-'+area]=new Chart(document.getElementById('bar-'+area),{
    type:'bar',
    data:{labels:bLabels,datasets:[
      {type:'bar',label:'Acerto em questões (%)',data:bAcertos,backgroundColor:bAcertos.map(v=>v>0?barColor(v)+'bb':'#e5e5e5'),borderColor:bAcertos.map(v=>v>0?barColor(v):'#ccc'),borderWidth:1,yAxisID:'y'},
      {type:'line',label:'Total revisões',data:bRevs,borderColor:'#aaa',borderWidth:2,pointRadius:4,pointBackgroundColor:'#888',yAxisID:'y2',tension:0.3}
    ]},
    options:{indexAxis:'y',responsive:true,interaction:{mode:'index',intersect:false},
      scales:{x:{display:false},y:{ticks:{font:{size:11}},grid:{display:false}},y2:{display:false,min:0,max:maxRevs+2}},
      plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label==='Acerto em questões (%)'?`Acerto: ${ctx.raw>0?ctx.raw+'%':'sem questões'}`:`Revisões: ${ctx.raw}x`}}}
    }
  });
  if(multiRevs.length)updateTimeline(area);
}

window.updateTimeline=function(area){
  const sel=document.getElementById('sel-'+area);if(!sel)return;
  const id=sel.value;
  const qs=getEntries(id).filter(e=>e.tipo==='questoes'&&e.acerto!=null);
  if(qs.length<2)return;
  const labels=qs.map((e,i)=>`${i+1}ª questão${e.date?' ('+e.date+')':''}`);
  const cor=AREAS[TOPICS.find(t=>t.id===id).area].cor;
  destroyChart('line-'+area);
  chartInstances['line-'+area]=new Chart(document.getElementById('line-'+area),{
    type:'line',
    data:{labels,datasets:[{label:'Acerto (%)',data:qs.map(e=>e.acerto),borderColor:cor,backgroundColor:cor+'22',borderWidth:2.5,pointRadius:5,pointBackgroundColor:cor,fill:true,tension:0.3}]},
    options:{responsive:true,scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'#f0f0ed'}},x:{ticks:{font:{size:10}},grid:{display:false}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw}%`}}}}
  });
};

// ── NAV ──
window.goPage=function(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(btn)btn.classList.add('active');
  currentPage=page;
  if(page==='home')renderHome();else renderPage(page);
  window.scrollTo(0,0);
};
window.goPageByArea=function(a){
  const tabs=document.querySelectorAll('.nav-tab');
  const map={LP:1,GEO:2,HIS:3,PED:4,LEG:5};
  goPage(a,tabs[map[a]]);
};

// ── RENDER PAGE ──
window.renderPage=function(area){
  buildPage(area);
  document.getElementById(area+'-legend').innerHTML=LEGEND_HTML;
  renderCharts(area);
  const sort=document.getElementById(area+'-sort').value;
  let topics=TOPICS.filter(t=>t.area===area);
  if(sort==='urgency')topics.sort((a,b)=>urgencyScore(b.id)-urgencyScore(a.id));
  else if(sort==='acerto-asc')topics.sort((a,b)=>(avgAcerto(a.id)??-1)-(avgAcerto(b.id)??-1));
  else if(sort==='revisoes-asc')topics.sort((a,b)=>totalRevs(a.id)-totalRevs(b.id));
  const groups={};
  topics.forEach(t=>{const g=t.g||'Tópicos';if(!groups[g])groups[g]=[];groups[g].push(t);});
  document.getElementById(area+'-content').innerHTML=Object.entries(groups).map(([g,items])=>`
    <div class="section">
      ${g&&g!=='Tópicos'?`<div class="section-title">${g}</div>`:''}
      ${items.map(t=>topicBlock(t)).join('')}
    </div>`).join('');
  const total=topics.length,nunca=topics.filter(t=>!state[t.id]||!state[t.id].lastDate).length;
  const com=topics.filter(t=>avgAcerto(t.id)!==null);
  const media=com.length>0?Math.round(com.reduce((s,t)=>s+avgAcerto(t.id),0)/com.length):null;
  document.getElementById(area+'-total').textContent=total;
  document.getElementById(area+'-nunca').textContent=nunca;
  document.getElementById(area+'-media').textContent=media!==null?media+'%':'—';
};

// ── MODAL ──
window.selectTipo=function(tipo){
  currentTipo=tipo;
  document.getElementById('btn-tipo-estudo').className='tipo-btn'+(tipo==='estudo'?' selected-estudo':'');
  document.getElementById('btn-tipo-questoes').className='tipo-btn'+(tipo==='questoes'?' selected-questoes':'');
  const ss=document.getElementById('slider-section');
  ss.classList.toggle('visible',tipo==='questoes');
  const btn=document.getElementById('btn-save-rev');
  btn.className='btn-save-rev ready-'+tipo;
  btn.textContent=tipo==='estudo'?'Registrar estudo':'Registrar questões';
};

window.openModal=function(id){
  const t=TOPICS.find(x=>x.id===id);
  currentModal=id;currentTipo=null;
  document.getElementById('m-title').textContent=t.title;
  document.getElementById('m-sub').textContent=AREAS[t.area].label+(t.g?' · '+t.g:'');
  document.getElementById('m-slider').value=50;
  document.getElementById('m-pct-val').textContent='50%';
  document.getElementById('btn-tipo-estudo').className='tipo-btn';
  document.getElementById('btn-tipo-questoes').className='tipo-btn';
  document.getElementById('slider-section').classList.remove('visible');
  document.getElementById('btn-save-rev').className='btn-save-rev';
  document.getElementById('btn-save-rev').textContent='Salvar';
  // histórico
  const entries=getEntries(id);
  const htitle=document.getElementById('m-hist-title'),hlist=document.getElementById('m-hist-list');
  if(entries.length>0){
    htitle.textContent='Histórico';
    hlist.innerHTML='<div class="hist-list">'+[...entries].reverse().map((e,ri)=>{
      const i=entries.length-1-ri;
      const isQ=e.tipo==='questoes';
      const convBtn=isQ?`<button class="btn-conv" onclick="convertToEstudo('${id}',${i})" title="Converter para estudo">→ estudo</button>`:'';
      return `<div class="hist-item">
        <span class="hist-type ${e.tipo}">${e.tipo==='estudo'?'📖 estudo':'✏️ questão'}</span>
        <span class="hist-date">${e.date||'—'}</span>
        <span class="hist-pct">${isQ&&e.acerto!=null?e.acerto+'%':'—'}</span>
        <div class="hist-actions">
          ${convBtn}
          <button class="btn-del" onclick="delEntry('${id}',${i})">✕</button>
        </div>
      </div>`;
    }).join('')+'</div>';
  }else{htitle.textContent='';hlist.innerHTML='<div class="empty-hist">Nenhuma revisão ainda.</div>';}
  document.getElementById('modal').classList.add('open');
};

window.convertToEstudo=function(id,idx){
  const entries=getEntries(id);
  if(!entries[idx])return;
  entries[idx].tipo='estudo';
  delete entries[idx].acerto;
  scheduleSave();
  openModal(id);
  if(currentPage!=='home')renderPage(currentPage);else renderHome();
};

window.delEntry=function(id,idx){
  const s=state[id];
  s.entries.splice(idx,1);
  s.revisoes=s.entries.length;
  // recalc lastDate
  const dates=s.entries.map(e=>e.date).filter(Boolean).map(d=>d.includes('/')?d.split('/').reverse().join('-'):d).sort();
  s.lastDate=dates.length>0?dates[dates.length-1]:null;
  scheduleSave();openModal(id);
  if(currentPage!=='home')renderPage(currentPage);else renderHome();
};

window.closeModal=function(){document.getElementById('modal').classList.remove('open');currentModal=null;currentTipo=null;};

window.saveRevisao=function(){
  if(!currentModal||!currentTipo)return;
  const s=state[currentModal];
  if(!s.entries)s.entries=[];
  const today=new Date().toLocaleDateString('pt-BR');
  const isoToday=new Date().toISOString().split('T')[0];
  const entry={tipo:currentTipo,date:today};
  if(currentTipo==='questoes') entry.acerto=parseInt(document.getElementById('m-slider').value);
  s.entries.push(entry);
  s.revisoes=s.entries.length;
  s.lastDate=isoToday;
  scheduleSave();closeModal();
  if(currentPage==='home')renderHome();else renderPage(currentPage);
};

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

setSyncBadge('saving');
loadFromFirebase();
</script>
